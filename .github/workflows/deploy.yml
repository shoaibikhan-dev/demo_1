name: Cloud-Native Deployment Pipeline
on:
  push:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Conftest
        run: |
          curl -sfL https://github.com/open-policy-agent/conftest/releases/download/v0.68.2/conftest_0.68.2_Linux_x86_64.tar.gz -o conftest.tar.gz
          tar xzf conftest.tar.gz
          sudo mv conftest /usr/local/bin/

      - name: Validate Manifests with Conftest
        run: |
          conftest test k3s/deployments/auth-deployment.yaml -p policy/
          conftest test k3s/deployments/complaint-deployment.yaml -p policy/
          conftest test k3s/deployments/notification-deployment.yaml -p policy/
          conftest test k3s/deployments/frontend-deployment.yaml -p policy/

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERUSERNAME }}
          password: ${{ secrets.DOCKERPASSWORD }}

      - name: Build Auth Service Image
        run: |
          docker build -t ${{ secrets.DOCKERUSERNAME }}/auth-service:${{ github.sha }} \
            -t ${{ secrets.DOCKERUSERNAME }}/auth-service:latest ./services/auth-service

      - name: Build Complaint Service Image
        run: |
          docker build -t ${{ secrets.DOCKERUSERNAME }}/complaint-service:${{ github.sha }} \
            -t ${{ secrets.DOCKERUSERNAME }}/complaint-service:latest ./services/complaint-service

      - name: Build Notification Service Image
        run: |
          docker build -t ${{ secrets.DOCKERUSERNAME }}/notification-service:${{ github.sha }} \
            -t ${{ secrets.DOCKERUSERNAME }}/notification-service:latest ./services/notification-service

      - name: Build Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKERUSERNAME }}/mardan-frontend:${{ github.sha }} \
            -t ${{ secrets.DOCKERUSERNAME }}/mardan-frontend:latest ./frontend

      - name: Trivy Scan Auth Service
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKERUSERNAME }}/auth-service:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library

      - name: Trivy Scan Complaint Service
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKERUSERNAME }}/complaint-service:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library

      - name: Trivy Scan Notification Service
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKERUSERNAME }}/notification-service:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library

      - name: Trivy Scan Frontend
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKERUSERNAME }}/mardan-frontend:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library


      - name: Generate SBOM Auth Service
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKERUSERNAME }}/auth-service:${{ github.sha }}
          format: cyclonedx
          output: sbom-auth.json

      - name: Generate SBOM Complaint Service
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKERUSERNAME }}/complaint-service:${{ github.sha }}
          format: cyclonedx
          output: sbom-complaint.json

      - name: Generate SBOM Notification Service
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKERUSERNAME }}/notification-service:${{ github.sha }}
          format: cyclonedx
          output: sbom-notification.json

      - name: Generate SBOM Frontend
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKERUSERNAME }}/mardan-frontend:${{ github.sha }}
          format: cyclonedx
          output: sbom-frontend.json

      - name: Upload SBOMs as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom-*.json


      - name: Kubesec Scan Auth Deployment
        run: |
          docker run -i kubesec/kubesec:v2 scan - < k3s/deployments/auth-deployment.yaml
          docker run -i kubesec/kubesec:v2 scan - < k3s/deployments/complaint-deployment.yaml
          docker run -i kubesec/kubesec:v2 scan - < k3s/deployments/notification-deployment.yaml
          docker run -i kubesec/kubesec:v2 scan - < k3s/deployments/frontend-deployment.yaml

      - name: Push Auth Service Image
        run: |
          docker push ${{ secrets.DOCKERUSERNAME }}/auth-service:${{ github.sha }}
          docker push ${{ secrets.DOCKERUSERNAME }}/auth-service:latest

      - name: Push Complaint Service Image
        run: |
          docker push ${{ secrets.DOCKERUSERNAME }}/complaint-service:${{ github.sha }}
          docker push ${{ secrets.DOCKERUSERNAME }}/complaint-service:latest

      - name: Push Notification Service Image
        run: |
          docker push ${{ secrets.DOCKERUSERNAME }}/notification-service:${{ github.sha }}
          docker push ${{ secrets.DOCKERUSERNAME }}/notification-service:latest

      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKERUSERNAME }}/mardan-frontend:${{ github.sha }}
          docker push ${{ secrets.DOCKERUSERNAME }}/mardan-frontend:latest

      - name: Sign Auth Service Image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGNPRIVATEKEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGNPASSWORD }}
        run: |
          cosign sign --key env://COSIGN_PRIVATE_KEY --yes \
            ${{ secrets.DOCKERUSERNAME }}/auth-service:${{ github.sha }}

      - name: Sign Complaint Service Image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGNPRIVATEKEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGNPASSWORD }}
        run: |
          cosign sign --key env://COSIGN_PRIVATE_KEY --yes \
            ${{ secrets.DOCKERUSERNAME }}/complaint-service:${{ github.sha }}

      - name: Sign Notification Service Image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGNPRIVATEKEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGNPASSWORD }}
        run: |
          cosign sign --key env://COSIGN_PRIVATE_KEY --yes \
            ${{ secrets.DOCKERUSERNAME }}/notification-service:${{ github.sha }}

      - name: Sign Frontend Image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGNPRIVATEKEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGNPASSWORD }}
        run: |
          cosign sign --key env://COSIGN_PRIVATE_KEY --yes \
            ${{ secrets.DOCKERUSERNAME }}/mardan-frontend:${{ github.sha }}

      - name: Update Image Tags in Kubernetes YAML
        env:
          DOCKER_USER: ${{ secrets.DOCKERUSERNAME }}
          SHA: ${{ github.sha }}
        run: |
          set -x
          echo "DOCKER_USER length: ${#DOCKER_USER}"
          sed -i "s|${DOCKER_USER}/auth-service[^\"]*|${DOCKER_USER}/auth-service:${SHA}|g" k3s/deployments/auth-deployment.yaml
          sed -i "s|${DOCKER_USER}/complaint-service[^\"]*|${DOCKER_USER}/complaint-service:${SHA}|g" k3s/deployments/complaint-deployment.yaml
          sed -i "s|${DOCKER_USER}/notification-service[^\"]*|${DOCKER_USER}/notification-service:${SHA}|g" k3s/deployments/notification-deployment.yaml
          sed -i "s|${DOCKER_USER}/mardan-frontend[^\"]*|${DOCKER_USER}/mardan-frontend:${SHA}|g" k3s/deployments/frontend-deployment.yaml

          git diff k3s/deployments/

          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add k3s/deployments/auth-deployment.yaml
          git add k3s/deployments/complaint-deployment.yaml
          git add k3s/deployments/notification-deployment.yaml
          git add k3s/deployments/frontend-deployment.yaml

          if git diff --cached --quiet; then
            echo "No image tag changes to commit, skipping."
          else
            git commit -m "ci: update images to ${SHA} [skip ci]"
            git push
          fi
