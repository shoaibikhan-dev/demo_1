name: Cloud-Native Deployment Pipeline
on:
  push:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERUSERNAME1 }}
          password: ${{ secrets.DOCKERPASSWORD1 }}

      - name: Build Auth Service Image
        run: |
          docker build -t ${{ secrets.DOCKERUSERNAME1 }}/auth-service:${{ github.sha }} \
            -t ${{ secrets.DOCKERUSERNAME1 }}/auth-service:latest ./services/auth-service

      - name: Build Complaint Service Image
        run: |
          docker build -t ${{ secrets.DOCKERUSERNAME1 }}/complaint-service:${{ github.sha }} \
            -t ${{ secrets.DOCKERUSERNAME1 }}/complaint-service:latest ./services/complaint-service

      - name: Build Notification Service Image
        run: |
          docker build -t ${{ secrets.DOCKERUSERNAME1 }}/notification-service:${{ github.sha }} \
            -t ${{ secrets.DOCKERUSERNAME1 }}/notification-service:latest ./services/notification-service

      - name: Build Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKERUSERNAME1 }}/mardan-frontend:${{ github.sha }} \
            -t ${{ secrets.DOCKERUSERNAME1 }}/mardan-frontend:latest ./frontend

      - name: Trivy Scan Auth Service
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKERUSERNAME1 }}/auth-service:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library

      - name: Trivy Scan Complaint Service
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKERUSERNAME1 }}/complaint-service:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library

      - name: Trivy Scan Notification Service
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKERUSERNAME1 }}/notification-service:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library

      - name: Trivy Scan Frontend
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKERUSERNAME1 }}/mardan-frontend:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library

      - name: Push Auth Service Image
        run: |
          docker push ${{ secrets.DOCKERUSERNAME1 }}/auth-service:${{ github.sha }}
          docker push ${{ secrets.DOCKERUSERNAME1 }}/auth-service:latest

      - name: Push Complaint Service Image
        run: |
          docker push ${{ secrets.DOCKERUSERNAME1 }}/complaint-service:${{ github.sha }}
          docker push ${{ secrets.DOCKERUSERNAME1 }}/complaint-service:latest

      - name: Push Notification Service Image
        run: |
          docker push ${{ secrets.DOCKERUSERNAME1 }}/notification-service:${{ github.sha }}
          docker push ${{ secrets.DOCKERUSERNAME1 }}/notification-service:latest

      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKERUSERNAME1 }}/mardan-frontend:${{ github.sha }}
          docker push ${{ secrets.DOCKERUSERNAME1 }}/mardan-frontend:latest

      - name: Sign Auth Service Image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGNPRIVATEKEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGNPASSWORD }}
        run: |
          cosign sign --key env://COSIGN_PRIVATE_KEY --yes \
            ${{ secrets.DOCKERUSERNAME1 }}/auth-service:${{ github.sha }}

      - name: Sign Complaint Service Image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGNPRIVATEKEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGNPASSWORD }}
        run: |
          cosign sign --key env://COSIGN_PRIVATE_KEY --yes \
            ${{ secrets.DOCKERUSERNAME1 }}/complaint-service:${{ github.sha }}

      - name: Sign Notification Service Image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGNPRIVATEKEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGNPASSWORD }}
        run: |
          cosign sign --key env://COSIGN_PRIVATE_KEY --yes \
            ${{ secrets.DOCKERUSERNAME1 }}/notification-service:${{ github.sha }}

      - name: Sign Frontend Image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGNPRIVATEKEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGNPASSWORD }}
        run: |
          cosign sign --key env://COSIGN_PRIVATE_KEY --yes \
            ${{ secrets.DOCKERUSERNAME1 }}/mardan-frontend:${{ github.sha }}

      - name: Update Image Tags in Kubernetes YAML
        run: |
          sed -i "s|${{ secrets.DOCKERUSERNAME1 }}/auth-service[^\"]*|${{ secrets.DOCKERUSERNAME1 }}/auth-service:${{ github.sha }}|g" k3s/deployments/auth-deployment.yaml
          sed -i "s|${{ secrets.DOCKERUSERNAME1 }}/complaint-service[^\"]*|${{ secrets.DOCKERUSERNAME1 }}/complaint-service:${{ github.sha }}|g" k3s/deployments/complaint-deployment.yaml
          sed -i "s|${{ secrets.DOCKERUSERNAME1 }}/notification-service[^\"]*|${{ secrets.DOCKERUSERNAME1 }}/notification-service:${{ github.sha }}|g" k3s/deployments/notification-deployment.yaml
          sed -i "s|${{ secrets.DOCKERUSERNAME1 }}/mardan-frontend[^\"]*|${{ secrets.DOCKERUSERNAME1 }}/mardan-frontend:${{ github.sha }}|g" k3s/deployments/frontend-deployment.yaml
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add k3s/deployments/auth-deployment.yaml
          git add k3s/deployments/complaint-deployment.yaml
          git add k3s/deployments/notification-deployment.yaml
          git add k3s/deployments/frontend-deployment.yaml
          git commit -m "ci: update images to ${{ github.sha }}"
          git push
