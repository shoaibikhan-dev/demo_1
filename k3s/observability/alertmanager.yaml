apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: demo-namespace
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      receiver: 'null'
    receivers:
    - name: 'null'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: demo-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: alertmanager
        image: docker.io/prom/alertmanager:v0.27.0
        args:
        - "--config.file=/etc/alertmanager/alertmanager.yml"
        - "--storage.path=/alertmanager"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
        ports:
        - containerPort: 9093
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
        volumeMounts:
        - name: config
          mountPath: /etc/alertmanager
        - name: storage
          mountPath: /alertmanager
      volumes:
      - name: config
        configMap:
          name: alertmanager-config
      - name: storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: demo-namespace
spec:
  selector:
    app: alertmanager
  ports:
  - port: 9093
    targetPort: 9093
