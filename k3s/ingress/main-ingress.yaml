apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: https-redirect
  namespace: demo-namespace
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: security-headers
  namespace: demo-namespace
spec:
  headers:
    forceSTSHeader: true
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    contentTypeNosniff: true
    browserXssFilter: true
    frameDeny: true
    referrerPolicy: "strict-origin-when-cross-origin"
    customResponseHeaders:
      X-Permitted-Cross-Domain-Policies: "none"
      Permissions-Policy: "camera=(), microphone=(), geolocation=()"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit
  namespace: demo-namespace
spec:
  rateLimit:
    average: 100
    burst: 50
    period: 1m
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: api-rate-limit
  namespace: demo-namespace
spec:
  rateLimit:
    average: 30
    burst: 20
    period: 1m
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: main-ingress
  namespace: demo-namespace
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: >-
      mardan-smart-city-security-headers@kubernetescrd,
      mardan-smart-city-rate-limit@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - mardan.local
    secretName: mardan-tls
  rules:
  - host: mardan.local
    http:
      paths:
      - path: /api/v1/auth
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 5001
      - path: /api/v1/users
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 5001
      - path: /api/v1/complaints
        pathType: Prefix
        backend:
          service:
            name: complaint-service
            port:
              number: 5002
      - path: /api/v1/categories
        pathType: Prefix
        backend:
          service:
            name: complaint-service
            port:
              number: 5002
      - path: /api/v1/notifications
        pathType: Prefix
        backend:
          service:
            name: notification-service
            port:
              number: 5003
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: http-redirect
  namespace: demo-namespace
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: mardan-smart-city-https-redirect@kubernetescrd
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
  - host: mardan.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
