apiVersion: apps/v1
kind: Deployment
metadata:
  name: complaint-service
  namespace: demo-namespace
  labels:
    app: complaint-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: complaint-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: complaint-service
        tier: backend
    spec:
      serviceAccountName: backend-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: complaint-service
        image: shanisha/complaint-service:051323ab051c1cd50dc6114196909014c93bf144
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 5002
        envFrom:
        - configMapRef:
            name: backend-config
        - secretRef:
            name: backend-secrets
        resources:
          requests:
            cpu: "200m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        startupProbe:
          httpGet:
            path: /api/health
            port: 5002
          failureThreshold: 30
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /api/health/ready
            port: 5002
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 5
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5002
          initialDelaySeconds: 30
          periodSeconds: 20
          failureThreshold: 5
          timeoutSeconds: 10
        volumeMounts:
        - name: uploads-volume
          mountPath: /usr/src/app/uploads
        - name: tmp-volume
          mountPath: /tmp
      volumes:
      - name: uploads-volume
        persistentVolumeClaim:
          claimName: uploads-pvc
      - name: tmp-volume
        emptyDir: {}
