apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: demo-namespace
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        seccompProfile:
          type: RuntimeDefault
      volumes:
      - name: socket-volume
        emptyDir:
          medium: Memory
          sizeLimit: 256Mi
      - name: tmp-volume
        emptyDir: {}
      - name: run-volume
        emptyDir:
          medium: Memory
          sizeLimit: 64Mi
      containers:
      - name: postgres
        image: postgres:15-alpine
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 999
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
        env:
        - name: POSTGRES_HOST_AUTH_METHOD
          value: "md5"
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        args:
        - "postgres"
        - "-c"
        - "password_encryption=md5"
        - "-c"
        - "max_connections=1000"
        - "-c"
        - "shared_buffers=512MB"
        ports:
        - containerPort: 5432
          name: postgres
        envFrom:
        - secretRef:
            name: postgres-secrets
        volumeMounts:
        - mountPath: /dev/shm
          name: socket-volume
        - mountPath: /tmp
          name: tmp-volume
        - mountPath: /var/run/postgresql
          name: run-volume
        - mountPath: /var/lib/postgresql/data
          name: postgres-data
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi

