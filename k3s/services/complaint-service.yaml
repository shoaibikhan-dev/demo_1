apiVersion: v1
kind: Service
metadata:
  name: complaint-service
  namespace: demo-namespace
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/api/metrics"
    prometheus.io/port: "5002"
spec:
  selector:
    app: complaint-service
  ports:
  - port: 5002
    targetPort: 5002
