apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: node-exporter-access
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app: node-exporter
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
      podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 9100
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prometheus-egress
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app: prometheus
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          app.kubernetes.io/name: traefik
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: demo-namespace
      podSelector:
        matchLabels:
          app: auth-service
    ports:
    - protocol: TCP
      port: 5001
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: demo-namespace
      podSelector:
        matchLabels:
          app: complaint-service
    ports:
    - protocol: TCP
      port: 5002
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: demo-namespace
      podSelector:
        matchLabels:
          app: notification-service
    ports:
    - protocol: TCP
      port: 5003
  - to:
    - podSelector:
        matchLabels:
          app: node-exporter
    ports:
    - protocol: TCP
      port: 9100
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
