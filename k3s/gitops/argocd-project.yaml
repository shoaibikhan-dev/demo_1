apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: mardan-project
  namespace: argocd
spec:
  description: Mardan Smart City Project
  sourceRepos:
  - 'https://github.com/shoaibikhan-dev/mardan-smart.git'
  - 'https://github.com/shoaibikhan-dev/demo_1.git'
  destinations:
  - namespace: argocd
    server: https://kubernetes.default.svc
  - namespace: demo-namespace
    server: https://kubernetes.default.svc
  - namespace: monitoring
    server: https://kubernetes.default.svc
  namespaceResourceWhitelist:
  - group: 'argoproj.io'
    kind: 'Application'
  - group: 'argoproj.io'
    kind: 'AppProject'
  - group: 'apps'
    kind: 'Deployment'
  - group: 'apps'
    kind: 'StatefulSet'
  - group: 'apps'
    kind: 'DaemonSet'
  - group: ''
    kind: 'Service'
  - group: ''
    kind: 'ConfigMap'
  - group: ''
    kind: 'ServiceAccount'
  - group: ''
    kind: 'PersistentVolumeClaim'
  - group: 'networking.k8s.io'
    kind: 'Ingress'
  - group: 'networking.k8s.io'
    kind: 'NetworkPolicy'
  - group: 'autoscaling'
    kind: 'HorizontalPodAutoscaler'
  - group: 'policy'
    kind: 'PodDisruptionBudget'
  - group: 'rbac.authorization.k8s.io'
    kind: 'Role'
  - group: 'rbac.authorization.k8s.io'
    kind: 'RoleBinding'
  - group: 'batch'
    kind: 'CronJob'
  - group: 'bitnami.com'
    kind: 'SealedSecret'
  - group: 'traefik.io'
    kind: 'Middleware'
  - group: 'keda.sh'
    kind: 'ScaledObject'
  - group: 'keda.sh'
    kind: 'TriggerAuthentication'
  - group: ''
    kind: 'Secret'
  clusterResourceWhitelist:
  - group: ''
    kind: 'Namespace'
  - group: 'argoproj.io'
    kind: 'AppProject'
  - group: 'argoproj.io'
    kind: 'Application'
  - group: 'constraints.gatekeeper.sh'
    kind: '*'
  - group: 'templates.gatekeeper.sh'
    kind: '*'
  - group: 'config.gatekeeper.sh'
    kind: '*'
  - group: 'rbac.authorization.k8s.io'
    kind: 'ClusterRole'
  - group: 'rbac.authorization.k8s.io'
    kind: 'ClusterRoleBinding'
  roles:
  - name: read-only
    description: Read only access
    policies:
    - p, proj:mardan-project:read-only, applications, get, mardan-project/*, allow
    groups:
    - mardan-viewers
